<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Starter</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .panel {
            width: min(90vw, 480px);
            background: #111c34;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.25rem;
        }

        h1 {
            margin-top: 0;
            font-size: 1.35rem;
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 0.55rem 0.8rem;
            background: #2563eb;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <section class="panel">
        <h1>Hello World Starter</h1>
        <p id="message">This starter app lives in its own folder under apps/.</p>
        <button id="change">Click Me</button>
    </section>

    <script>
        document.getElementById('change').addEventListener('click', function () {
            document.getElementById('message').textContent =
                'It works. Duplicate this folder for your next Gemini Canvas app.';
        });
    </script>
</body>

</html>
